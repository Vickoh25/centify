<div class="profile">
  <div class="page-header">
    <div>
      <h1 class="page-title">Profile</h1>
      <p class="page-sub">Manage your account details and password</p>
    </div>
    <button class="btn btn-danger" type="button" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout
    </button>
  </div>

  @if (success) {
    <div class="alert success">{{ success }}</div>
  }

  @if (error) {
    <div class="alert error">{{ error }}</div>
  }

  <div class="card">
    <div class="card-header">
      <span class="card-title">Personal Information</span>
    </div>

    <form (ngSubmit)="saveProfile()" class="profile-form">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name</label>
          <input name="firstName" [(ngModel)]="form.firstName" required maxlength="80">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input name="lastName" [(ngModel)]="form.lastName" required maxlength="80">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input name="email" [(ngModel)]="form.email" type="email" required>
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select name="currency" [(ngModel)]="form.currency">
            <option value="USD">USD</option>
            <option value="KES">KES</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
          </select>
        </div>
      </div>

      <div class="section-title">Password</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Current Password</label>
          <input name="currentPassword" [(ngModel)]="form.currentPassword" type="password" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input name="newPassword" [(ngModel)]="form.newPassword" type="password" minlength="8" maxlength="72" autocomplete="new-password">
        </div>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="saving">
        {{ saving ? 'Saving...' : 'Save Profile' }}
      </button>
    </form>
  </div>
</div>
