<div class="verify-page">
  <div class="verify-panel">
    <div class="brand">
      <div class="brand-mark">
        <img src="assets/centify-logo.png" alt="Centify logo">
      </div>
      <div>
        <h1>Verify Email</h1>
        <p>Enter the code sent to {{ user()?.email }}</p>
      </div>
    </div>

    @if (error) {
      <div class="alert error">{{ error }}</div>
    }

    @if (success) {
      <div class="alert success">{{ success }}</div>
    }

    <form (ngSubmit)="verify()" class="verify-form">
      <div class="form-group">
        <label>Verification Code</label>
        <input name="code" [(ngModel)]="code" inputmode="numeric" maxlength="6" placeholder="000000">
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Verifying...' : 'Verify Email' }}
      </button>
      <button class="btn btn-ghost" type="button" (click)="resend()" [disabled]="resending">
        {{ resending ? 'Sending...' : 'Resend Code' }}
      </button>
    </form>
  </div>
</div>
