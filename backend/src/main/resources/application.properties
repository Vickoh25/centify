# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/centify
spring.datasource.username=centify_user
spring.datasource.password=centify123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

jwt.secret=centify-local-development-secret-change-before-production
jwt.expiration-ms=8640000000
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Email / OTP
# Set CENTIFY_MAIL_USERNAME and CENTIFY_MAIL_PASSWORD in your environment.
# For Gmail, CENTIFY_MAIL_PASSWORD must be a Google App Password, not your normal password.
spring.mail.host=${CENTIFY_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${CENTIFY_MAIL_PORT:587}
spring.mail.username=${CENTIFY_MAIL_USERNAME:}
spring.mail.password=${CENTIFY_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
