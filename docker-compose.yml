services:
  postgres:
    image: postgres:16
    container_name: centify-postgres
    environment:
      POSTGRES_DB: centify
      POSTGRES_USER: centify_user
      POSTGRES_PASSWORD: centify123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - centify-network
    restart: unless-stopped

  backend:
    image: vickoh25/centify-backend:latest
    container_name: centify-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/centify
      SPRING_DATASOURCE_USERNAME: centify_user
      SPRING_DATASOURCE_PASSWORD: centify123
    expose:
      - "8080"
    depends_on:
      - postgres
    networks:
      - centify-network
    restart: unless-stopped

  frontend:
    image: vickoh25/centify-frontend:latest
    container_name: centify-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - centify-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: centify-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - centify-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  centify-network:
    driver: bridge
